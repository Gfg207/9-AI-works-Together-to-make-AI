<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>LifeAI Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-emerald-500 font-mono">

  <header class="header">
    LIFE-AI // PROJECT 68M
  </header>

  <div class="grid">
    <div class="card" id="vram">
      <h3>VRAM Monitor</h3>
      <p>Użycie: <span id="vramValue">75%</span></p>
    </div>

    <div class="card">
      <h3>Language Matrix</h3>
      <p>Aktywny język: <span id="lang">PL</span></p>
    </div>

    <div class="card terminal">
      <h3>Training Terminal</h3>
      <pre id="terminalOutput">[BOOT] Initializing LifeAI core...</pre>
    </div>
  </div>

  <script src="ui.js"></script>
</body>
</html>
